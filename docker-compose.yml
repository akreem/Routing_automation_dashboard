services:
  web:
    build: .
    command: bash -c "python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8011:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - POSTGRES_DB=${POSTGRES_DB:-akremdb}
      - POSTGRES_USER=${POSTGRES_USER:-akrem}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-akrempass}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ROUTER_USERNAME=${ROUTER_USERNAME:-amine}
      - ROUTER_PASSWORD=${ROUTER_PASSWORD:-amine123}
      - ROUTER_SECRET=${ROUTER_SECRET:-amine123}
    depends_on:
      - db

  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-akremdb}
      - POSTGRES_USER=${POSTGRES_USER:-akrem}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-akrempass}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  
